name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - v1-implementation

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Swift tests
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Run tests with coverage
        run: swift test --enable-code-coverage
